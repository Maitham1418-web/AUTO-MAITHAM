<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — ريلز AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: #13131a; --surface2: #1c1c27;
      --border: #2a2a3d; --accent: #7c3aed; --accent2: #a855f7;
      --accent-glow: rgba(124,58,237,.35); --text: #f0f0f8; --muted: #8888aa;
      --red: #ef4444; --green: #22c55e; --yellow: #f59e0b;
    }
    body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* TOPBAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50;
    }
    .logo { font-size: 1.3rem; font-weight: 900; color: var(--accent2); text-decoration: none; }
    .logo span { color: var(--text); }
    .user-info { display: flex; align-items: center; gap: 1rem; }
    .quota-badge {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 99px; padding: .3rem .9rem; font-size: .82rem; color: var(--muted);
    }
    .quota-badge b { color: var(--accent2); }
    .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: .4rem .9rem; border-radius: 8px; font-family: 'Cairo', sans-serif; font-size: .85rem; cursor: pointer; transition: all .2s; }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* MAIN */
    main { flex: 1; padding: 2rem; max-width: 900px; margin: 0 auto; width: 100%; }
    h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 1.5rem; }

    /* GENERATOR CARD */
    .gen-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
    .gen-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: .4rem; }
    .form-group.full { grid-column: 1/-1; }
    label { font-size: .85rem; color: var(--muted); font-weight: 600; }
    textarea, select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: .75rem;
      font-family: 'Cairo', sans-serif; font-size: .95rem;
      transition: border-color .2s;
    }
    textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 100px; }

    /* UPLOAD */
    .upload-area {
      border: 2px dashed var(--border); border-radius: 10px;
      padding: 2rem; text-align: center; cursor: pointer;
      transition: all .2s; position: relative;
    }
    .upload-area:hover, .upload-area.dragover { border-color: var(--accent); background: rgba(124,58,237,.05); }
    .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon { font-size: 2rem; margin-bottom: .5rem; }
    .upload-text { color: var(--muted); font-size: .9rem; }
    .upload-text b { color: var(--accent2); }
    .preview-grid { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .8rem; }
    .preview-img { width: 60px; height: 60px; border-radius: 6px; object-fit: cover; border: 1px solid var(--border); }

    /* GENERATE BUTTON */
    .btn-generate {
      width: 100%; padding: 1rem; border: none; border-radius: 12px;
      font-family: 'Cairo', sans-serif; font-size: 1.05rem; font-weight: 900;
      cursor: pointer; transition: all .2s; margin-top: 1.5rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }
    .btn-generate:hover { opacity: .9; box-shadow: 0 0 30px var(--accent-glow); transform: translateY(-1px); }
    .btn-generate:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* PROGRESS */
    .progress-wrap { display: none; margin-top: 1.5rem; }
    .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; margin-bottom: .5rem; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; width: 0%; transition: width .4s; }
    .progress-text { text-align: center; color: var(--muted); font-size: .88rem; }

    /* RESULT */
    .result-wrap { display: none; margin-top: 1.5rem; background: var(--surface2); border-radius: 12px; padding: 1.5rem; text-align: center; }
    .result-wrap h4 { font-size: 1rem; font-weight: 700; color: var(--green); margin-bottom: 1rem; }
    .result-wrap video { width: 100%; max-width: 360px; border-radius: 10px; border: 1px solid var(--border); }
    .btn-download {
      display: inline-flex; align-items: center; gap: .5rem;
      margin-top: 1rem; padding: .7rem 1.5rem; border-radius: 8px;
      background: var(--green); color: #fff; text-decoration: none;
      font-family: 'Cairo', sans-serif; font-weight: 700; font-size: .95rem;
      transition: opacity .2s;
    }
    .btn-download:hover { opacity: .85; }

    /* HISTORY */
    .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; }
    .history-card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent2); }
    .history-empty { text-align: center; color: var(--muted); padding: 2rem; font-size: .9rem; }
    .history-list { display: flex; flex-direction: column; gap: .8rem; }
    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface2); border-radius: 10px; padding: .8rem 1rem;
      gap: 1rem;
    }
    .history-info { flex: 1; }
    .history-title { font-size: .9rem; font-weight: 700; }
    .history-meta { font-size: .8rem; color: var(--muted); margin-top: .2rem; }
    .history-dl { color: var(--accent2); text-decoration: none; font-size: .85rem; font-weight: 700; }

    /* MSG */
    .msg { border-radius: 8px; padding: .7rem 1rem; font-size: .88rem; margin-bottom: 1rem; display: none; }
    .msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.3); color: var(--red); }
    .msg.info { background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.3); color: var(--accent2); }

    @media(max-width: 640px) { .form-grid { grid-template-columns: 1fr; } main { padding: 1rem; } }
  </style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">ريلز<span>AI</span></a>
  <div class="user-info">
    <div class="quota-badge">الفيديوهات المتبقية: <b id="quotaLeft">—</b></div>
    <button class="btn-logout" id="logoutBtn">خروج</button>
  </div>
</div>

<main>
  <h2>توليد فيديو إعلاني</h2>

  <div class="gen-card">
    <h3>⚡ أنشئ إعلانك الآن</h3>
    <div class="msg" id="genMsg"></div>

    <div class="form-grid">
      <!-- نص الإعلان -->
      <div class="form-group full">
        <label>نص الإعلان *</label>
        <textarea id="adText" placeholder="اكتب وصف المنتج والعرض... مثال: عطر فاخر بسعر 99 ريال، توصيل سريع لجميع المدن، عرض محدود هذا الأسبوع فقط!"></textarea>
      </div>

      <!-- نوع الإعلان -->
      <div class="form-group">
        <label>نوع الإعلان</label>
        <select id="adType">
          <option value="promo_reel">Reels ترويجي</option>
          <option value="product_story">قصة منتج</option>
          <option value="offer_discount">عرض وخصم</option>
          <option value="brand_intro">تعريف بالعلامة التجارية</option>
        </select>
      </div>

      <!-- المنصة -->
      <div class="form-group">
        <label>المنصة المستهدفة</label>
        <select id="platform">
          <option value="instagram">إنستقرام</option>
          <option value="tiktok">تيك توك</option>
          <option value="snapchat">سناب شات</option>
        </select>
      </div>

      <!-- حجم الفيديو -->
      <div class="form-group">
        <label>حجم الفيديو</label>
        <select id="videoSize">
          <option value="9:16">9:16 — عمودي (Reels / TikTok)</option>
          <option value="1:1">1:1 — مربع (فيد إنستقرام)</option>
          <option value="4:5">4:5 — بورتريه (إنستقرام)</option>
          <option value="16:9">16:9 — أفقي (يوتيوب)</option>
        </select>
      </div>
      <div class="size-preview-wrap form-group" style="display:flex;align-items:center;gap:.8rem;">
        <div id="sizePreview" style="background:var(--surface2);border:2px solid var(--accent);border-radius:6px;transition:all .3s;"></div>
        <div>
          <div id="sizeLabel" style="font-size:.9rem;font-weight:700;color:var(--accent2);"></div>
          <div id="sizePx" style="font-size:.8rem;color:var(--muted);margin-top:.2rem;"></div>
        </div>
      </div>

      <!-- رفع الصور -->
      <div class="form-group full">
        <label>صور المنتج (حتى 4 صور)</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="imageInput" accept="image/*" multiple />
          <div class="upload-icon">📁</div>
          <div class="upload-text">اسحب الصور هنا أو <b>انقر للرفع</b></div>
          <div class="upload-text" style="font-size:.8rem;margin-top:.3rem">PNG, JPG — حتى 10MB لكل صورة</div>
        </div>
        <div class="preview-grid" id="previewGrid"></div>
      </div>
    </div>

    <button class="btn-generate" id="generateBtn">⚡ توليد الفيديو الآن</button>

    <!-- شريط التقدم -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">جاري التوليد...</div>
    </div>

    <!-- النتيجة -->
    <div class="result-wrap" id="resultWrap">
      <h4>✅ الفيديو جاهز!</h4>
      <video id="resultVideo" controls autoplay muted loop></video>
      <br/>
      <a id="downloadBtn" class="btn-download" download="reelz-ai-video.mp4">⬇ تحميل الفيديو</a>
    </div>
  </div>

  <!-- سجل الفيديوهات -->
  <div class="history-card">
    <h3>📂 فيديوهاتي السابقة</h3>
    <div class="history-list" id="historyList">
      <div class="history-empty">لا توجد فيديوهات بعد — ولّد أول فيديو لك!</div>
    </div>
  </div>
</main>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './js/config.js';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Auth guard
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { location.href = 'login.html'; }

  const user = session.user;

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabase.auth.signOut();
    location.href = 'login.html';
  });

  // Load quota from DB
  async function loadQuota() {
    const { data } = await supabase.from('profiles').select('videos_remaining').eq('id', user.id).single();
    document.getElementById('quotaLeft').textContent = data?.videos_remaining ?? '—';
    return data?.videos_remaining ?? 0;
  }
  loadQuota();

  // Video size preview
  const sizeMap = {
    '9:16': { w: 36, h: 64, label: 'عمودي', px: '1080 × 1920' },
    '1:1':  { w: 52, h: 52, label: 'مربع',  px: '1080 × 1080' },
    '4:5':  { w: 48, h: 60, label: 'بورتريه', px: '1080 × 1350' },
    '16:9': { w: 72, h: 40, label: 'أفقي',  px: '1920 × 1080' }
  };
  function updateSizePreview() {
    const val = document.getElementById('videoSize').value;
    const s = sizeMap[val];
    const prev = document.getElementById('sizePreview');
    prev.style.width  = s.w + 'px';
    prev.style.height = s.h + 'px';
    document.getElementById('sizeLabel').textContent = s.label + ' (' + val + ')';
    document.getElementById('sizePx').textContent = s.px + ' px';
  }
  document.getElementById('videoSize').addEventListener('change', updateSizePreview);
  updateSizePreview();

  // Image preview
  const imageInput = document.getElementById('imageInput');
  const previewGrid = document.getElementById('previewGrid');
  let selectedFiles = [];

  imageInput.addEventListener('change', () => {
    selectedFiles = Array.from(imageInput.files).slice(0, 4);
    previewGrid.innerHTML = '';
    selectedFiles.forEach(f => {
      const img = document.createElement('img');
      img.className = 'preview-img';
      img.src = URL.createObjectURL(f);
      previewGrid.appendChild(img);
    });
  });

  // Drag & drop
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
  uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    imageInput.files = e.dataTransfer.files;
    imageInput.dispatchEvent(new Event('change'));
  });

  // Progress simulation
  function startProgress() {
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    const steps = [
      [10, 'تحليل الصور...'],
      [30, 'بناء السيناريو...'],
      [55, 'توليد الفيديو...'],
      [80, 'معالجة الصوت...'],
      [95, 'التجهيز النهائي...']
    ];
    let i = 0;
    document.getElementById('progressWrap').style.display = 'block';
    const interval = setInterval(() => {
      if (i < steps.length) { fill.style.width = steps[i][0] + '%'; text.textContent = steps[i][1]; i++; }
      else clearInterval(interval);
    }, 2000);
    return interval;
  }

  // Generate
  document.getElementById('generateBtn').addEventListener('click', async () => {
    const adText = document.getElementById('adText').value.trim();
    const adType = document.getElementById('adType').value;
    const platform = document.getElementById('platform').value;
    const videoSize = document.getElementById('videoSize').value;
    const msgEl = document.getElementById('genMsg');

    if (!adText) {
      msgEl.className = 'msg error'; msgEl.style.display = 'block';
      msgEl.textContent = 'الرجاء كتابة نص الإعلان';
      return;
    }
    msgEl.style.display = 'none';

    const quota = await loadQuota();
    if (quota <= 0) {
      msgEl.className = 'msg error'; msgEl.style.display = 'block';
      msgEl.textContent = 'انتهت فيديوهاتك هذا الشهر — يرجى ترقية باقتك';
      return;
    }

    const btn = document.getElementById('generateBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري التوليد...';
    document.getElementById('resultWrap').style.display = 'none';

    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    document.getElementById('progressWrap').style.display = 'block';
    progressFill.style.width = '5%';
    progressText.textContent = 'جاري إرسال الطلب...';

    let videoUrl = '';
    let fakeProgress = 5;

    // شريط تقدم وهمي يزحف ببطء حتى ينتهي الفيديو
    const fakeBar = setInterval(() => {
      if (fakeProgress < 88) { fakeProgress += 1.2; progressFill.style.width = fakeProgress + '%'; }
    }, 2500);

    const msgs = ['إرسال الطلب إلى Veo 3.1 4K...','تحليل الصورة بالذكاء الاصطناعي...','Google Veo 3.1 يعمل...','جودة 4K تحتاج وقتاً أطول...','اكتمال قريباً...'];
    let mi = 0;
    const msgRotate = setInterval(() => { if (mi < msgs.length) progressText.textContent = msgs[mi++]; }, 15000);

    try {
      // 1. رفع الصورة إن وجدت
      const imageUrls = [];
      for (const file of selectedFiles) {
        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const path = `${user.id}/${Date.now()}_${safeName}`;
        const { error: upErr } = await supabase.storage.from('ad-images').upload(path, file);
        if (!upErr) {
          const { data: urlData } = supabase.storage.from('ad-images').getPublicUrl(path);
          imageUrls.push(urlData.publicUrl);
        }
      }

      // 2. إرسال طلب التوليد → يرجع taskId فوراً
      const genRes = await fetch(`${SUPABASE_URL}/functions/v1/generate-video`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
        body: JSON.stringify({ prompt: adText, imageUrls, adType, platform, videoSize })
      });
      const genData = await genRes.json();
      if (genData.error) throw new Error(genData.error);
      const taskId = genData.taskId;

      // 3. Polling في المتصفح — كل 8 ثوانٍ، أقصى 5 دقائق
      progressText.textContent = 'Google Veo 3.1 يعمل على الفيديو...';
      for (let i = 0; i < 38; i++) {
        await new Promise(r => setTimeout(r, 8000));
        const chkRes = await fetch(`${SUPABASE_URL}/functions/v1/check-video`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({ taskId })
        });
        const chk = await chkRes.json();
        if (chk.error) throw new Error(chk.error);
        if (chk.done) { videoUrl = chk.video_url; break; }
      }
      if (!videoUrl) throw new Error('انتهت المهلة — حاول مجدداً');

      clearInterval(fakeBar);
      clearInterval(msgRotate);
      progressFill.style.width = '100%';
      progressText.textContent = 'اكتمل!';

      // حفظ في السجل
      await supabase.from('video_history').insert({
        user_id: user.id, video_url: videoUrl,
        ad_text: adText.substring(0, 100), ad_type: adType, platform
      });

      // إنقاص الكوتا
      await supabase.from('profiles').update({ videos_remaining: quota - 1 }).eq('id', user.id);
      document.getElementById('quotaLeft').textContent = quota - 1;

      // عرض النتيجة
      setTimeout(() => {
        document.getElementById('progressWrap').style.display = 'none';
        const resultWrap = document.getElementById('resultWrap');
        const video = document.getElementById('resultVideo');
        const dlBtn = document.getElementById('downloadBtn');
        video.src = videoUrl;
        dlBtn.href = videoUrl;
        resultWrap.style.display = 'block';
        loadHistory();
      }, 400);

    } catch (err) {
      clearInterval(fakeBar);
      clearInterval(msgRotate);
      document.getElementById('progressWrap').style.display = 'none';
      msgEl.className = 'msg error'; msgEl.style.display = 'block';
      msgEl.textContent = 'حدث خطأ أثناء التوليد، حاول مرة أخرى';
      console.error(err);
    }

    btn.disabled = false;
    btn.textContent = '⚡ توليد الفيديو الآن';
  });

  function buildPrompt(text, type, platform, size) {
    const typeMap = {
      promo_reel: 'promotional social media reel',
      product_story: 'product story video',
      offer_discount: 'sale and discount advertisement',
      brand_intro: 'brand introduction video'
    };
    const sizeDesc = { '9:16':'vertical 9:16', '1:1':'square 1:1', '4:5':'portrait 4:5', '16:9':'horizontal 16:9' };
    return `Create a ${typeMap[type]} for ${platform} in ${sizeDesc[size]||size} format. Product: ${text}. Dynamic, modern, Arab market social media style.`;
  }

  // Load history
  async function loadHistory() {
    const { data } = await supabase.from('video_history')
      .select('*').eq('user_id', user.id)
      .order('created_at', { ascending: false }).limit(10);

    const list = document.getElementById('historyList');
    if (!data || data.length === 0) {
      list.innerHTML = '<div class="history-empty">لا توجد فيديوهات بعد — ولّد أول فيديو لك!</div>';
      return;
    }
    const typeNames = { promo_reel: 'ترويجي', product_story: 'قصة منتج', offer_discount: 'عرض وخصم', brand_intro: 'تعريف بالعلامة' };
    list.innerHTML = data.map(v => `
      <div class="history-item">
        <div class="history-info">
          <div class="history-title">${v.ad_text || 'فيديو إعلاني'}</div>
          <div class="history-meta">${typeNames[v.ad_type] || v.ad_type} · ${v.platform} · ${new Date(v.created_at).toLocaleDateString('ar-SA')}</div>
        </div>
        <a href="${v.video_url}" class="history-dl" download>⬇ تحميل</a>
      </div>
    `).join('');
  }
  loadHistory();
</script>
</body>
</html>
