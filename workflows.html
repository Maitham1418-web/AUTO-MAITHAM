<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>سير العمل | أوتو فلو</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--primary:#6c63ff;--primary-dark:#4b44cc;--secondary:#00d4aa;--accent:#ff6584;--bg:#0a0a14;--surface:#12121f;--surface2:#1a1a2e;--text:#e8e8f0;--text-muted:#8888aa;--border:rgba(108,99,255,0.15);--glow:rgba(108,99,255,0.3);--font:'Segoe UI',system-ui,sans-serif;--radius:16px;--radius-sm:8px;--sidebar:260px;}
    body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;min-height:100vh;}
    .sidebar{width:var(--sidebar);background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:50;}
    .sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border);}
    .sidebar-logo a{font-size:20px;font-weight:900;text-decoration:none;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .sidebar-nav{flex:1;padding:20px 12px;display:flex;flex-direction:column;gap:4px;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);color:var(--text-muted);text-decoration:none;font-size:14px;font-weight:600;transition:all .2s;}
    .nav-item:hover{background:rgba(108,99,255,.08);color:var(--text);}
    .nav-item.active{background:rgba(108,99,255,.15);color:var(--primary);}
    .nav-item .icon{font-size:18px;width:22px;text-align:center;}
    .nav-section{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);padding:16px 14px 8px;opacity:.6;}
    .sidebar-footer{padding:16px 12px;border-top:1px solid var(--border);}
    .user-card{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--radius-sm);}
    .user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--secondary));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;}
    .user-info{flex:1;min-width:0;}
    .user-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .user-plan{font-size:11px;color:var(--secondary);font-weight:600;}
    .logout-btn{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:color .2s;}
    .logout-btn:hover{color:var(--accent);}
    .main{margin-right:var(--sidebar);flex:1;}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
    .topbar-title{font-size:20px;font-weight:900;letter-spacing:-.5px;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:999px;font-size:14px;font-weight:700;cursor:pointer;border:none;text-decoration:none;transition:all .25s;font-family:var(--font);}
    .btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 4px 16px var(--glow);}
    .btn-primary:hover{transform:translateY(-1px);}
    .btn-sm{padding:7px 14px;font-size:12px;}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text-muted);}
    .btn-ghost:hover{border-color:var(--primary);color:var(--primary);}
    .btn-danger{background:rgba(255,101,132,.12);border:1px solid rgba(255,101,132,.2);color:var(--accent);}
    .btn-danger:hover{background:rgba(255,101,132,.2);}
    .content{padding:32px;}

    /* FILTERS */
    .filters{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap;}
    .filter-btn{padding:8px 18px;border-radius:999px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text-muted);transition:all .2s;font-family:var(--font);}
    .filter-btn.active{background:rgba(108,99,255,.15);border-color:var(--primary);color:var(--primary);}
    .filter-btn:hover:not(.active){border-color:rgba(108,99,255,.3);color:var(--text);}

    /* GRID */
    .workflows-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;}
    .wf-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s;position:relative;}
    .wf-card:hover{border-color:rgba(108,99,255,.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.2);}
    .wf-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
    .wf-icon{width:44px;height:44px;border-radius:12px;background:rgba(108,99,255,.12);display:flex;align-items:center;justify-content:center;font-size:22px;}
    .wf-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
    .badge-active{background:rgba(0,212,170,.12);color:var(--secondary);}
    .badge-paused{background:rgba(251,191,36,.12);color:#fbbf24;}
    .badge-draft{background:rgba(136,136,170,.12);color:var(--text-muted);}
    .wf-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;}
    .wf-name{font-size:16px;font-weight:800;margin-bottom:6px;}
    .wf-desc{font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:16px;min-height:40px;}
    .wf-stats{display:flex;gap:20px;margin-bottom:20px;padding-top:16px;border-top:1px solid var(--border);}
    .wf-stat{text-align:center;}
    .wf-stat-val{font-size:18px;font-weight:900;}
    .wf-stat-label{font-size:11px;color:var(--text-muted);}
    .wf-actions{display:flex;gap:8px;}
    .empty-state{text-align:center;padding:80px 24px;grid-column:1/-1;}
    .empty-icon{font-size:64px;margin-bottom:20px;}
    .empty-title{font-size:20px;font-weight:900;margin-bottom:10px;}
    .empty-desc{font-size:15px;color:var(--text-muted);margin-bottom:28px;}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;max-width:400px;width:90%;text-align:center;}
    .modal h3{font-size:20px;font-weight:900;margin-bottom:10px;}
    .modal p{color:var(--text-muted);font-size:14px;margin-bottom:24px;}
    .modal-actions{display:flex;gap:12px;justify-content:center;}

    @media(max-width:768px){.sidebar{display:none;}.main{margin-right:0;}.content{padding:20px;}}
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo"><a href="dashboard.html">⚡ أوتو فلو</a></div>
    <nav class="sidebar-nav">
      <div class="nav-section">الرئيسية</div>
      <a href="dashboard.html" class="nav-item"><span class="icon">📊</span> لوحة التحكم</a>
      <a href="workflows.html" class="nav-item active"><span class="icon">⚡</span> سير العمل</a>
      <a href="builder.html" class="nav-item"><span class="icon">🔧</span> بناء Workflow</a>
      <div class="nav-section">الأدوات</div>
      <a href="job-search.html" class="nav-item"><span class="icon">💼</span> البحث عن وظيفة</a>
      <div class="nav-section">الإعدادات</div>
      <a href="settings.html" class="nav-item"><span class="icon">⚙️</span> الإعدادات</a>
      <a href="index.html" class="nav-item"><span class="icon">🌐</span> الموقع الرئيسي</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="userInitial">؟</div>
        <div class="user-info"><div class="user-name" id="userName">...</div><div class="user-plan">الباقة المجانية</div></div>
        <button class="logout-btn" onclick="signOut()">⬅️</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">سير العمل</div>
      <a href="builder.html" class="btn btn-primary">⚡ Workflow جديد</a>
    </div>
    <div class="content">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="active">نشط</button>
        <button class="filter-btn" data-filter="paused">متوقف</button>
        <button class="filter-btn" data-filter="draft">مسودة</button>
      </div>
      <div class="workflows-grid" id="workflowsGrid">
        <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">جاري التحميل...</div></div>
      </div>
    </div>
  </main>

  <!-- DELETE MODAL -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>🗑️ حذف الـ Workflow؟</h3>
      <p>لا يمكن التراجع عن هذا الإجراء. سيتم حذف الـ workflow وجميع سجلات تشغيله.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeModal()">إلغاء</button>
        <button class="btn btn-danger" id="confirmDelete">حذف نهائياً</button>
      </div>
    </div>
  </div>

  <script src="js/supabase-config.js"></script>
  <script>
    let allWorkflows = [], deleteId = null, currentFilter = 'all';

    const icons = { email:'📧', form:'📝', schedule:'⏰', webhook:'🔗', default:'⚡' };
    const statusMap = { active:['badge-active','نشط'], paused:['badge-paused','متوقف'], draft:['badge-draft','مسودة'] };

    function renderWorkflows(wfs) {
      const grid = document.getElementById('workflowsGrid');
      if (wfs.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">⚡</div><div class="empty-title">لا يوجد workflows</div><div class="empty-desc">أنشئ أول workflow لك الآن</div><a href="builder.html" class="btn btn-primary">إنشاء workflow</a></div>`;
        return;
      }
      grid.innerHTML = wfs.map(w => {
        const [cls, label] = statusMap[w.status] || ['badge-draft','مسودة'];
        const icon = icons[w.trigger_type] || icons.default;
        const lastRun = w.last_run ? new Date(w.last_run).toLocaleDateString('ar-SA') : 'لم يُشغَّل بعد';
        return `<div class="wf-card" data-id="${w.id}">
          <div class="wf-header">
            <div class="wf-icon">${icon}</div>
            <span class="wf-badge ${cls}">${label}</span>
          </div>
          <div class="wf-name">${w.name}</div>
          <div class="wf-desc">${w.description || 'بدون وصف'}</div>
          <div class="wf-stats">
            <div class="wf-stat"><div class="wf-stat-val">${w.runs_count||0}</div><div class="wf-stat-label">تشغيل</div></div>
            <div class="wf-stat"><div class="wf-stat-val" style="font-size:12px;font-weight:600;color:var(--text-muted)">${lastRun}</div><div class="wf-stat-label">آخر تشغيل</div></div>
          </div>
          <div class="wf-actions">
            <a href="builder.html?id=${w.id}" class="btn btn-ghost btn-sm">✏️ تعديل</a>
            ${w.status==='active'
              ? `<button class="btn btn-ghost btn-sm" onclick="toggleStatus('${w.id}','paused')">⏸ إيقاف</button>`
              : `<button class="btn btn-ghost btn-sm" onclick="toggleStatus('${w.id}','active')">▶️ تشغيل</button>`}
            <button class="btn btn-danger btn-sm" onclick="openDelete('${w.id}')">🗑️</button>
          </div>
        </div>`;
      }).join('');
    }

    async function toggleStatus(id, status) {
      await db.from('workflows').update({ status }).eq('id', id);
      const w = allWorkflows.find(x => x.id === id);
      if (w) w.status = status;
      applyFilter();
    }

    function openDelete(id) { deleteId = id; document.getElementById('deleteModal').classList.add('open'); }
    function closeModal() { document.getElementById('deleteModal').classList.remove('open'); deleteId = null; }

    document.getElementById('confirmDelete').addEventListener('click', async () => {
      if (!deleteId) return;
      await db.from('workflows').delete().eq('id', deleteId);
      allWorkflows = allWorkflows.filter(w => w.id !== deleteId);
      closeModal(); applyFilter();
    });

    function applyFilter() {
      const filtered = currentFilter === 'all' ? allWorkflows : allWorkflows.filter(w => w.status === currentFilter);
      renderWorkflows(filtered);
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    (async () => {
      const user = requireAuth();
      if (!user) return;
      const profile = getProfile();
      const name = profile.full_name || user.email.split('@')[0];
      document.getElementById('userName').textContent = name;
      document.getElementById('userInitial').textContent = name[0].toUpperCase();
      const { data } = await db.from('workflows').select('*').order('created_at',{ascending:false});
      allWorkflows = data || [];
      applyFilter();
    })();
  </script>
</body>
</html>
